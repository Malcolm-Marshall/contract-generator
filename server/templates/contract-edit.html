<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Edit Contract</title>
    <style>
        :root {
            color-scheme: light;
            color: #102a43;
            background: #f7f8fb;
            font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
            font-size: 15px;
            line-height: 1.45;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #f7f8fb;
            color: #102a43;
        }

        .page-shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px 20px;
            height: 100%;
            background: #f8fafc;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        }

        .container {
            display: grid;
            grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
            gap: 16px;
            align-items: start;
            height: 100%;
        }

        .panel {
            padding: 16px;
            border-radius: 14px;
            background: #ffffff;
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.05);
        }

        .left-panel,
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
            height: 100%;
            overflow: hidden;
        }

        .left-panel {
            overflow-y: auto;
            padding-right: 2px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 700;
            font-size: 0.94rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid #d2d8e0;
            background: #f8fafc;
            color: #0f172a;
            font-size: 0.92rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.14);
            background: #ffffff;
        }

        textarea {
            min-height: 56px;
            resize: vertical;
        }

        .preview-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 7px;
        }

        .preview-toolbar button {
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            color: #1e293b;
            padding: 6px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .preview-toolbar button:hover {
            background: #eef2ff;
            transform: translateY(-1px);
        }

        .preview-toolbar button:active {
            transform: translateY(0);
        }

        .preview {
            flex: 1;
            min-height: 0;
            padding: 12px;
            background: #ffffff;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
            overflow: auto;
            color: #1e293b;
        }

        .preview:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.16);
        }

        .preview h2 {
            margin: 1.1em 0 0.3em;
            font-size: 1.15rem;
            font-weight: 700;
            color: #0f172a;
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
            padding-bottom: 0.3em;
        }

        .preview p {
            margin: 0 0 0.65em;
            color: #334155;
            font-size: 0.92rem;
            line-height: 1.35;
        }

        .preview ul,
        .preview ol {
            margin: 0 0 0.65em 1.2em;
            padding-left: 0;
        }

        .preview ul {
            list-style: disc inside;
        }

        .preview ol {
            list-style: decimal inside;
        }

        .preview li {
            margin: 0.55em 0;
        }

        .preview .page-break {
            border-top: 1px dashed rgba(100, 116, 139, 0.6);
            border-bottom: 1px dashed rgba(100, 116, 139, 0.6);
            color: #475569;
            text-align: center;
            padding: 10px 0;
            margin: 28px 0;
            font-size: 0.95rem;
            font-style: italic;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 14px;
            background: #4338ca;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
            padding: 10px 14px;
        }

        button:hover {
            background: #3730a3;
        }

        button:active {
            transform: translateY(1px);
        }

        .copy-btn {
            background: #e2e8f0;
            color: #0f172a;
            border: 1px solid transparent;
        }

        .copy-btn:hover {
            background: #c7d2fe;
        }

        @media (max-width: 960px) {
            .container {
                grid-template-columns: 1fr;
            }

            .hero,
            .panel {
                padding: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="page-shell">
        <div class="container">
        <form class="left-panel" id="contractForm" autocomplete="off" onsubmit="return false;">
            <div class="form-group" style="margin-bottom:8px; padding:8px 6px; border-radius:8px; background:#fff; border:1px solid rgba(203,213,225,0.6)">
                <label style="font-weight:700; margin:0 0 6px; display:block; font-size:0.95rem">Saved contractor</label>
                <div style="display:flex; gap:8px; align-items:center;">
                    <select id="savedContractors" style="min-width:160px; padding:6px 8px; border-radius:8px; border:1px solid #cbd5e1; background:#fff"></select>
                    <button id="saveContractorBtn" type="button" class="copy-btn">Save</button>
                    <button id="deleteContractorBtn" type="button" class="copy-btn">Delete</button>
                </div>
            </div>
            <div class="form-group">
                <label for="customerName">Customer Name</label>
                <input id="customerName" name="customerName" placeholder="Customer Name" autocomplete="off" />
            </div>
            <div class="form-group">
                <label for="projectAddress">Project Address</label>
                <input id="projectAddress" name="projectAddress" placeholder="123 Main St, Denver, CO" />
            </div>
            <div class="form-group">
                <label for="projectDescription">Project Description</label>
                <textarea id="projectDescription" name="projectDescription" rows="2"
                    placeholder="e.g. Install new fence"></textarea>
            </div>
            <div class="form-group">
                <label for="contractorBusinessName">Contractor Business Name</label>
                <input id="contractorBusinessName" name="contractorBusinessName" placeholder="Business Name" />
            </div>
            <div class="form-group">
                <label for="contractorName">Contractor Name</label>
                <input id="contractorName" name="contractorName" placeholder="Contractor Name" />
            </div>
            <div class="form-group">
                <label for="contractorPhone">Contractor Phone</label>
                <input id="contractorPhone" name="contractorPhone" placeholder="Phone Number" />
            </div>
            <div class="form-group">
                <label for="startDate">Start Date</label>
                <input id="startDate" name="startDate" type="date" />
            </div>
            <div class="form-group">
                <label for="jobPrice">Job Price</label>
                <input id="jobPrice" name="jobPrice" type="number" step="0.01" placeholder="e.g. 3500.00" />
            </div>
            <div class="form-group">
                <label for="catTopiaSigner">CatTopia Signer</label>
                <input id="catTopiaSigner" name="catTopiaSigner" placeholder="CatTopia Signer" />
            </div>
            <div class="form-group">
                <label for="contractDate">Contract Date</label>
                <input id="contractDate" name="contractDate" type="date" />
            </div>
            <div class="actions">
                <div style="display:flex; gap:8px; margin-left:auto; align-items:center;">
                    <input id="filename" placeholder="contract.pdf" value="contract.pdf" style="width:160px; padding:6px 8px; border-radius:8px;" />
                    <button id="download" type="button">Download PDF</button>
                </div>
            </div>
            <div class="actions" style="margin-top:10px;">
                <button id="copyBtn" type="button" class="copy-btn">Copy to Clipboard</button>
            </div>
        </form>
        <div class="right-panel" style="flex:1">
            <label style="font-weight:bold; display:block; margin-bottom:8px; color: #334155;">Preview</label>
            <label style="font-weight:italic; display:block; margin-bottom:8px; color: #58316a;">For dem DSB's</label>

            <div class="preview-toolbar">
                <button type="button" onclick="formatText('bold')"><strong>B</strong></button>
                <button type="button" onclick="formatText('italic')"><em>I</em></button>
                <button type="button" onclick="formatText('formatBlock', 'H2')">Heading</button>
                <button type="button" onclick="formatText('insertUnorderedList')">Bullet</button>
                <button type="button" onclick="formatText('insertOrderedList')">Numbered</button>
                <button type="button" onclick="insertPageBreak()">Page Break</button>
            </div>
            <div id="preview" class="preview" contenteditable="true" spellcheck="false"></div>
        </div>
    </div>
    <script>
        // Contract template and placeholder logic
        let contractTemplate = '';
        let latestPreviewHtml = '';
        const formFields = [
            'customerName',
            'projectAddress',
            'projectDescription',
            'contractorBusinessName',
            'contractorName',
            'contractorPhone',
            'startDate',
            'jobPrice',
            'catTopiaSigner',
            'contractDate'
        ];

        // Helper for formatting dates in MM/DD/YYYY
        function formatDate(val) {
            if (!val) return '';
            const d = new Date(val);
            if (isNaN(d)) return val;
            return [
                ('0' + (d.getMonth() + 1)).slice(-2),
                ('0' + d.getDate()).slice(-2),
                d.getFullYear()
            ].join('/');
        }

        // Helper for formatting price
        function formatPrice(val) {
            if (!val) return '';
            const n = Number(val);
            if (isNaN(n)) return val;
            return '$' + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getFormValues() {
            const values = {};
            for (const field of formFields) {
                let el = document.getElementById(field);
                if (el) {
                    let v = el.value || '';
                    if (field === 'startDate' || field === 'contractDate') v = formatDate(v);
                    if (field === 'jobPrice') v = formatPrice(v);
                    values[field] = v;
                }
            }
            return values;
        }

        function fillTemplate(template, values) {
            // Replace placeholders like {{contractorName}}
            return template.replace(/{{\s*([a-zA-Z0-9_]+)\s*}}/g, (m, key) => {
                return values[key] !== undefined ? values[key] : m;
            });
        }

        function updatePreview() {
            if (!contractTemplate) return;
            const values = getFormValues();
            const filled = fillTemplate(contractTemplate, values);
            const previewHtml = renderHtmlFromText(filled);
            latestPreviewHtml = previewHtml;
            document.getElementById('preview').innerHTML = previewHtml;
        }

        function formatText(command, value = null) {
            document.getElementById('preview').focus();
            document.execCommand(command, false, value);
            updateLatestPreviewHtml();
        }

        function insertPageBreak() {
            const preview = document.getElementById('preview');
            const pageBreakHtml = '<div class="page-break">Page Break</div><p><br></p>';
            document.execCommand('insertHTML', false, pageBreakHtml);
            updateLatestPreviewHtml();
        }

        function updateLatestPreviewHtml() {
            latestPreviewHtml = document.getElementById('preview').innerHTML;
        }

        // --- Saved contractors (localStorage) ---
        const CONTRACTOR_STORAGE_KEY = 'savedContractors_v1';
        const LAST_USED_KEY = 'lastSavedContractor_v1';

        function loadSavedContractors() {
            const raw = localStorage.getItem(CONTRACTOR_STORAGE_KEY) || '{}';
            try {
                return JSON.parse(raw);
            } catch (e) {
                return {};
            }
        }

        function saveSavedContractors(obj) {
            localStorage.setItem(CONTRACTOR_STORAGE_KEY, JSON.stringify(obj));
        }

        function populateSavedContractorsSelect() {
            const map = loadSavedContractors();
            const sel = document.getElementById('savedContractors');
            if (!sel) return;
            sel.innerHTML = '';
            const empty = document.createElement('option');
            empty.value = '';
            empty.textContent = '— Saved contractors —';
            sel.appendChild(empty);
            Object.keys(map).sort().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.appendChild(opt);
            });
            // Do not auto-apply the last-used contractor so the form defaults to blank.
            // The last-used value is still remembered but selection remains empty until the user chooses.
            const last = localStorage.getItem(LAST_USED_KEY);
            if (last && map[last]) {
                // leave sel.value as '' to default to a blank form
            }
        }

        function applySavedContractor(name) {
            const map = loadSavedContractors();
            const data = map[name];
            if (!data) return;
            for (const k of formFields) {
                const el = document.getElementById(k);
                if (!el) continue;
                el.value = data[k] || '';
            }
            localStorage.setItem(LAST_USED_KEY, name);
            updatePreview();
        }

        function saveContractor() {
            const defaultName = document.getElementById('contractorBusinessName').value || document.getElementById('contractorName').value || '';
            const name = window.prompt('Save contractor as:', defaultName).trim();
            if (!name) return;
            const map = loadSavedContractors();
            map[name] = getFormValues();
            saveSavedContractors(map);
            localStorage.setItem(LAST_USED_KEY, name);
            populateSavedContractorsSelect();
        }

        function deleteContractor() {
            const sel = document.getElementById('savedContractors');
            if (!sel) return;
            const name = sel.value;
            if (!name) return alert('Select a saved contractor to delete');
            if (!confirm(`Delete saved contractor "${name}"?`)) return;
            const map = loadSavedContractors();
            delete map[name];
            saveSavedContractors(map);
            localStorage.removeItem(LAST_USED_KEY);
            populateSavedContractorsSelect();
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateSavedContractorsSelect();
            const sel = document.getElementById('savedContractors');
            if (sel) sel.addEventListener('change', (e) => {
                const name = e.target.value;
                if (name) applySavedContractor(name);
            });
            const saveBtn = document.getElementById('saveContractorBtn');
            if (saveBtn) saveBtn.addEventListener('click', saveContractor);
            const delBtn = document.getElementById('deleteContractorBtn');
            if (delBtn) delBtn.addEventListener('click', deleteContractor);
        });

        function renderHtmlFromText(text) {
            const blocks = String(text)
                .split(/\r?\n\r?\n+/)
                .map(block => block.trim())
                .filter(Boolean);

            const headingMap = [
                'Project Details',
                'Description',
                'Construction Agreement',
                'Scope of Work',
                'Additional Materials',
                'Payment',
                'Walkthrough Checklist Requirements',
                'Submission Process',
                'Final Payment Release',
                'Cancellation and Refund Policy',
                'Indemnification',
                'Change Orders',
                'Timeliness and Quality of Work',
                'Questions and Communication',
                'Attendance Requirement',
                'Insurance',
                'Contractor Licensing',
                'Communication Requirement',
                'Confidentiality',
                'Cleanup',
                'Signatures'
            ];

            return blocks.map((block, index) => {
                const lines = block.split(/\r?\n/).map(line => line.replace(/\t/g, '    ')).filter(Boolean);
                if (lines.length === 0) return '';

                const firstLine = lines[0];
                const cleanFirstLine = firstLine.replace(/:$/, '');
                const isHeading = headingMap.includes(cleanFirstLine) || (lines.length === 1 && /^[A-Z][A-Za-z0-9 &'"()\-\/]+$/.test(cleanFirstLine) && cleanFirstLine.length < 60);
                const bodyLines = isHeading ? lines.slice(1) : lines;
                const headingHtml = isHeading ? `<h2>${escapeHtml(cleanFirstLine)}</h2>` : '';

                if (bodyLines.length === 0) {
                    return headingHtml;
                }

                if (bodyLines.some(line => /^\s*([\-*+]\s+|\d+\.\s+)/.test(line))) {
                    return `${headingHtml}${renderNestedList(bodyLines)}`;
                }

                const textHtml = bodyLines.map(line => escapeHtml(line)).join('<br>');
                const blockHtml = `${headingHtml}<p>${textHtml}</p>`;
                const isDescription = /^description$/i.test(cleanFirstLine);
                return isDescription ? `${blockHtml}<div class="page-break">Page Break</div>` : blockHtml;
            }).join('');
        }

        function renderNestedList(lines) {
            const stack = [{ tag: null, indent: -1, items: [] }];

            for (const rawLine of lines) {
                const match = rawLine.match(/^(\s*)([\-*+]\s+|\d+\.\s+)(.*)$/);
                if (!match) {
                    while (stack.length > 1) stack.pop();
                    stack[0].items.push({ type: 'p', text: rawLine });
                    continue;
                }

                const indent = Math.floor(match[1].length / 4);
                const marker = match[2].trim();
                const content = match[3].trim();
                const listTag = /^\d+\.$/.test(marker) ? 'ol' : 'ul';

                while (stack.length > 1 && indent <= stack[stack.length - 1].indent) stack.pop();
                const parent = stack[stack.length - 1];
                let list = parent.items[parent.items.length - 1];
                if (!list || list.type !== 'list' || list.tag !== listTag || list.indent !== indent) {
                    list = { type: 'list', tag: listTag, indent, items: [] };
                    parent.items.push(list);
                }

                const item = { type: 'li', text: content, children: [] };
                list.items.push(item);
                stack.push({ tag: listTag, indent, items: item.children });
            }

            function renderItems(items) {
                return items.map(node => {
                    if (node.type === 'p') {
                        return `<p>${escapeHtml(node.text)}</p>`;
                    }
                    if (node.type === 'list') {
                        return `<${node.tag}>${renderItems(node.items)}</${node.tag}>`;
                    }
                    if (node.type === 'li') {
                        return `<li>${escapeHtml(node.text)}${renderItems(node.children)}</li>`;
                    }
                    return '';
                }).join('');
            }

            return renderItems(stack[0].items);
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function loadTemplate() {
            try {
                const resp = await fetch('/templates/Contractor%20Agreement.txt');
                contractTemplate = await resp.text();
                updatePreview();
                const preview = document.getElementById('preview');
                preview.addEventListener('input', updateLatestPreviewHtml);
            } catch (e) { console.warn(e); }
        }
        loadTemplate();

        // Attach change/input events to form fields
        for (const field of formFields) {
            const el = document.getElementById(field);
            if (el) {
                el.addEventListener('input', updatePreview);
                el.addEventListener('change', updatePreview);
            }
        }

        // Copy to clipboard
        document.getElementById('copyBtn').addEventListener('click', function () {
            navigator.clipboard.writeText(document.getElementById('preview').innerText).then(() => {
                document.getElementById('copyBtn').textContent = "Copied!";
                setTimeout(() => {
                    document.getElementById('copyBtn').textContent = "Copy to Clipboard";
                }, 1200);
            });
        });

        // Download PDF
        document.getElementById('download').addEventListener('click', async () => {
            updateLatestPreviewHtml();
            const html = latestPreviewHtml;
            const filename = document.getElementById('filename').value || 'contract.pdf';
            try {
                const res = await fetch('/pdf', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ html, filename }) });
                if (!res.ok) { alert('Error creating PDF'); return; }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
            } catch (err) { console.error(err); alert('Failed to generate PDF'); }
        });
    </script>
</body>

</html>
